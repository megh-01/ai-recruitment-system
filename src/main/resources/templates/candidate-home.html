<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Home</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Candidate Portal</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/candidate-register">Register</a>
    </div>
</nav>

<div class="dashboard-container">
    <h1>Available Job Vacancies</h1>
    <p class="subtitle">Welcome, <span id="candidateName">Candidate</span>. View jobs and apply directly.</p>

    <div class="form-card small-card">
        <label>Your Candidate ID</label>
        <input type="number" id="candidateId" placeholder="Enter your candidate ID">
    </div>

    <div id="jobsContainer" class="jobs-grid"></div>
</div>

<script>
    document.getElementById("candidateName").innerText =
        localStorage.getItem("candidateName") || "Candidate";

    document.getElementById("candidateId").value =
        localStorage.getItem("candidateId") || "";

    function loadJobs() {
        fetch("/api/jobs")
            .then(response => response.json())
            .then(jobs => {
                const container = document.getElementById("jobsContainer");

                if (jobs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-box">
                            <h2>No Vacancies Available</h2>
                            <p>Please check again later.</p>
                        </div>
                    `;
                    return;
                }

                let cards = "";

                jobs.forEach(job => {
                    cards += `
                        <div class="job-card">
                            <div class="job-header">
                                <h2>${job.title}</h2>
                                <span>Job ID: ${job.id}</span>
                            </div>

                            <p class="company">${job.companyName}</p>
                            <p class="location">📍 ${job.location}</p>

                            <div class="job-info">
                                <strong>Required Skills:</strong>
                                <p>${job.requiredSkills}</p>
                            </div>

                            <div class="job-info">
                                <strong>Experience:</strong>
                                <p>${job.experienceRequired}</p>
                            </div>

                            <div class="job-info">
                                <strong>Description:</strong>
                                <p>${job.description}</p>
                            </div>

                            <button class="btn primary full" onclick="applyJob(${job.id})">
                                Apply for this Job
                            </button>

                            <div id="result-${job.id}" class="result-box"></div>
                        </div>
                    `;
                });

                container.innerHTML = cards;
            });
    }

    function applyJob(jobId) {
        const candidateId = Number(document.getElementById("candidateId").value);

        if (!candidateId) {
            alert("Please enter Candidate ID first");
            return;
        }

        const data = {
            candidateId: candidateId,
            jobId: jobId
        };

        fetch("/api/applications/apply", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        })
        .then(async response => {
            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.message || "Application failed");
            }

            return result;
        })
		.then(result => {
		    const match = result.matchPercentage !== undefined
		        && result.matchPercentage !== null
		        ? Number(result.matchPercentage).toFixed(2)
		        : "0.00";

		    const selected = result.status === "SELECTED";

		    const decisionText = selected
		        ? "Congratulations! You are selected for the next procedure."
		        : "Your profile was not selected for the next procedure.";

		    const decisionClass = selected
		        ? "candidate-selected"
		        : "candidate-rejected";

		    document.getElementById("result-" + jobId).innerHTML =
		        "<div class='" + decisionClass + "'>" +
		            "<strong>" + decisionText + "</strong><br>" +
		            "Application ID: " + result.id + "<br>" +
		            "Status: " + result.status + "<br>" +
		            "AI Match: " + match + "%<br>" +
		            "The result has been sent to your registered email." +
		        "</div>";
		})
    }

    loadJobs();
</script>

</body>
</html>
