<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Registration</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Candidate Portal</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/candidate-login">Login</a>
    </div>
</nav>

<div class="form-container">
    <div class="form-card">
        <h2>Candidate Registration</h2>
        <p>Create your account, candidate profile and upload your resume.</p>

        <form id="candidateRegisterForm" enctype="multipart/form-data">

            <h3>Account Details</h3>

            <label>Name</label>
            <input type="text" id="name" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <h3 class="section-title">Candidate Details</h3>

            <label>Phone</label>
            <input type="text" id="phone" required>

            <label>Education</label>
            <input type="text" id="education" placeholder="Example: MCA" required>

            <label>Skills</label>
            <input type="text" id="skills" placeholder="Java, Spring Boot, PostgreSQL" required>

            <label>Experience</label>
            <input type="text" id="experience" placeholder="Fresher / 1 Year" required>

            <h3 class="section-title">Resume Upload</h3>

            <label>Upload Resume</label>
            <input type="file" id="resumeFile" accept=".pdf,.txt">

            <button type="submit" class="btn primary full">Register as Candidate</button>
        </form>

        <div id="result" class="result-box"></div>
    </div>
</div>

<script>
    document.getElementById("candidateRegisterForm").addEventListener("submit", async function(event) {
        event.preventDefault();

        try {
            const userData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: "CANDIDATE"
            };

            const userResponse = await fetch("/api/auth/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(userData)
            });

            const user = await userResponse.json();

            if (!userResponse.ok) {
                throw new Error(user.message || "Candidate account creation failed");
            }

            const candidateData = {
                fullName: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                education: document.getElementById("education").value,
                skills: document.getElementById("skills").value,
                experience: document.getElementById("experience").value,
                userId: user.id
            };

            const candidateResponse = await fetch("/api/candidates", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(candidateData)
            });

            const candidate = await candidateResponse.json();

            if (!candidateResponse.ok) {
                throw new Error(candidate.message || "Candidate profile creation failed");
            }

            localStorage.setItem("candidateUserId", user.id);
            localStorage.setItem("candidateId", candidate.id);
            localStorage.setItem("candidateName", candidate.fullName);

            let resumeMessage = "";

            const fileInput = document.getElementById("resumeFile");
            const file = fileInput.files[0];

            if (file) {
                const formData = new FormData();
                formData.append("file", file);

                const resumeResponse = await fetch("/api/resumes/upload/" + candidate.id, {
                    method: "POST",
                    body: formData
                });

                const resume = await resumeResponse.json();

                if (!resumeResponse.ok) {
                    throw new Error(resume.message || "Resume upload failed");
                }

                resumeMessage = "<br>Resume Uploaded: " + resume.fileName;
            }

			document.getElementById("result").innerHTML =
			    "<strong>Candidate Registered Successfully!</strong><br>" +
			    "Candidate ID: " + candidate.id + "<br>" +
			    "Name: " + candidate.fullName +
			    resumeMessage +
			    "<br><br><strong>Use Email and Password for candidate login.</strong>" +
			    "<br>Redirecting to Candidate Portal...";

            setTimeout(() => {
                window.location.href = "/candidate-home";
            }, 2500);

        } catch (error) {
            document.getElementById("result").innerHTML =
                "<strong>Error</strong><br>" + error.message;
        }
    });
</script>

</body>
</html>
