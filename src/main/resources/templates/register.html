<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register User</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">AI RecruitTrack</div>
	<div class="nav-links">
	    <a href="/">Home</a>
	    <a href="/register-page">Register</a>
	    <a href="/candidate-page">Candidate</a>
	    <a href="/job-page">Post Job</a>
	    <a href="/jobs-list">Vacancies</a>
	    <a href="/apply-page">Apply</a>
	    <a href="/dashboard">Dashboard</a>
	</div>
</nav>

<div class="form-container">
    <div class="form-card">
        <h2>User Registration</h2>
        <p>Create a new candidate, recruiter, or admin user.</p>

        <form id="registerForm">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter full name" required>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <label>Role</label>
            <select id="role" required>
                <option value="">Select Role</option>
                <option value="CANDIDATE">Candidate</option>
                <option value="RECRUITER">Recruiter</option>
                <option value="ADMIN">Admin</option>
            </select>

            <button type="submit" class="btn primary full">Register</button>
        </form>

        <div id="result" class="result-box"></div>
    </div>
</div>

<script>
    document.getElementById("registerForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const data = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value
        };

        fetch("/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                "<strong>User Registered Successfully!</strong><br>User ID: " + data.id +
                "<br>Name: " + data.name +
                "<br>Email: " + data.email +
                "<br>Role: " + data.role;
        })
        .catch(error => {
            document.getElementById("result").innerHTML = "Error: " + error;
        });
    });
</script>

</body>
</html>
