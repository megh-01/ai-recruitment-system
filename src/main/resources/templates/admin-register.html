<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Registration</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Admin Portal</div>
    <div class="nav-links">
        <a href="/">Home</a>
    </div>
</nav>

<div class="form-container">
    <div class="form-card">
        <h2>Admin Registration</h2>
        <p>Create admin account to monitor the recruitment system.</p>

        <form id="adminForm">
            <label>Name</label>
            <input type="text" id="name" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <button type="submit" class="btn primary full">Register as Admin</button>
        </form>

        <div id="result" class="result-box"></div>
    </div>
</div>

<script>
    document.getElementById("adminForm").addEventListener("submit", async function(event) {
        event.preventDefault();

        const data = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: "ADMIN"
        };

        const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!response.ok) {
            document.getElementById("result").innerHTML =
                "<strong>Error</strong><br>" + (result.message || "Registration failed");
            return;
        }

        localStorage.setItem("adminId", result.id);
        localStorage.setItem("adminName", result.name);

        document.getElementById("result").innerHTML =
            "<strong>Admin Registered Successfully!</strong><br>Redirecting...";

        setTimeout(() => {
            window.location.href = "/admin-dashboard";
        }, 1200);
    });
</script>

</body>
</html>
